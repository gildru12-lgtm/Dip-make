<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת הפקת תעודות - STIA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@500;700&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0d0e15;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* לוח הבקרה הכהה */
        .controls {
            background: #131520;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #23273a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            direction: rtl;
            margin-bottom: 30px;
        }

        .controls h2 {
            text-align: center;
            color: #c5a059;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #23273a;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #c5a059;
            margin-bottom: 8px;
        }

        .form-group input[type="text"] {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #23273a;
            background: #090a0f;
            color: #fff;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            text-align: left;
        }

        /* עיצוב כפתור העלאת קובץ תמונת החניך */
        .file-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #090a0f;
            border: 1px solid #23273a;
            border-radius: 8px;
            padding: 6px 10px;
            height: 32px;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: none;
            margin-right: auto;
        }

        .file-name-display {
            font-size: 13px;
            color: #888;
            margin-right: 5px;
            font-family: 'Montserrat', sans-serif;
        }

        /* כפתורי פעולה בתחתית */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit {
            background: #c5a059;
            color: #000;
        }

        .btn-submit:hover {
            background: #e5bf73;
        }

        .btn-secondary {
            background: #1f2335;
            color: #fff;
            border: 1px solid #313754;
        }

        /* ---------------------------------------------------- */
        /* מכל התעודה - שומר על קואורדינטות קבועות של 1000x1000 */
        /* ---------------------------------------------------- */
        .certificate-container {
            position: relative;
            width: 1000px;
            height: 1000px;
            background-image: url('diploma.png'); /* קובץ הרקע הקיים בתיקיית ה-GitHub */
            background-size: contain;
            background-repeat: no-repeat;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        /* מיקום תמונת המוסמך בריבוע (ימין למעלה) */
        .student-photo-box {
            position: absolute;
            top: 161px;
            right: 133px; 
            width: 105px;
            height: 130px;
            overflow: hidden;
        }

        .student-photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; 
        }

        /* שם החניך במרכז */
        .student-name {
            position: absolute;
            top: 508px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 34px;
            font-weight: 700;
            color: #111111;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* טקסט ההסמכה הדינמי בזהב - ממוקם בול מתחת לשם ובמרכז */
        .certification-title {
            position: absolute;
            top: 608px;
            left: 50%;
            transform: translateX(-50%);
            width: 750px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 700;
            color: #c5a059; /* צבע זהב */
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* תאריך ההסמכה בריבוע בצד ימין למטה */
        .date-awarded-box {
            position: absolute;
            top: 607px;
            right: 133px;
            width: 147px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #2c2c2c;
            text-transform: uppercase;
        }

        /* מיקומי התארים מתחת לקווים החלקים למטה */
        .signature-overlay-section {
            position: absolute;
            bottom: 215px; 
            width: 100%;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 0 185px;
        }

        .sig-block {
            width: 200px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* כותרת SIGNATURE קבועה */
        .sig-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #2c2c2c;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* התארים הדינמיים מתחת לקווים (באנגלית באותיות גדולות) */
        .sig-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #4a4a4a;
            margin-top: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            width: 250px;
            text-align: center;
        }

        /* החבאת לוח הבקרה בזמן הדפסה/שמירה */
        @media print {
            .controls { display: none; }
            body { background: none; padding: 0; }
            .certificate-container { box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>מערכת הפקת תעודות - STIA</h2>
        
        <div class="form-group">
            <label>שם החניך (באנגלית):</label>
            <input type="text" id="nameInput" value="ELIAV COHEN" oninput="updateTexts()">
        </div>
        
        <div class="form-group">
            <label>הסמכה (תוצג במרכז בזהב ובאותיות גדולות):</label>
            <input type="text" id="certInput" value="CERTIFIED DEFENSIVE TACTICS INSTRUCTOR" oninput="updateTexts()">
        </div>
        
        <div class="form-group">
            <label>תאריך הסמכה:</label>
            <input type="text" id="dateInput" value="May 2026 16" oninput="updateTexts()">
        </div>

        <div class="form-group">
            <label>תואר מתחת לקו שמאל (באותיות גדולות):</label>
            <input type="text" id="leftTitleInput" value="CHIEF INSTRUCTOR" oninput="updateTexts()">
        </div>

        <div class="form-group">
            <label>תואר מתחת לקו ימין (באותיות גדולות):</label>
            <input type="text" id="rightTitleInput" value="GLOBAL DIRECTOR" oninput="updateTexts()">
        </div>
        
        <div class="form-group">
            <label>תמונת חניך (פספורט):</label>
            <div class="file-input-wrapper">
                <span class="file-name-display" id="photoName">no file selected</span>
                <button class="file-input-btn">Choose File</button>
                <input type="file" accept="image/*" onchange="handleFileLoad(event)">
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary">📱 תצוגה לנייד</button>
            <button class="btn btn-submit" onclick="window.print()">🖨️ הדפס / שמור כ-PDF</button>
        </div>
    </div>

    <div class="certificate-container" id="certificate">
        
        <div class="student-photo-box">
            <img id="studentPhoto" src="" alt="Student Photo">
        </div>

        <div class="student-name" id="displayName">ELIAV COHEN</div>

        <div class="certification-title" id="displayCert">CERTIFIED DEFENSIVE TACTICS INSTRUCTOR</div>

        <div class="date-awarded-box" id="displayDate">MAY 2026 16</div>

        <div class="signature-overlay-section">
            
            <div class="sig-block">
                <div class="sig-title">SIGNATURE</div>
                <div class="sig-subtitle" id="displayLeftTitle">CHIEF INSTRUCTOR</div>
            </div>
            
            <div class="sig-block">
                <div class="sig-title">SIGNATURE</div>
                <div class="sig-subtitle" id="displayRightTitle">GLOBAL DIRECTOR</div>
            </div>
            
        </div>

    </div>

    <script>
        // עדכון טקסטים דינמיים בזמן אמת והפיכתם לאותיות גדולות
        function updateTexts() {
            const nameVal = document.getElementById('nameInput').value;
            const certVal = document.getElementById('certInput').value;
            const dateVal = document.getElementById('dateInput').value;
            const leftTitleVal = document.getElementById('leftTitleInput').value;
            const rightTitleVal = document.getElementById('rightTitleInput').value;
            
            document.getElementById('displayName').innerText = nameVal.toUpperCase();
            document.getElementById('displayCert').innerText = certVal.toUpperCase();
            document.getElementById('displayDate').innerText = dateVal.toUpperCase();
            document.getElementById('displayLeftTitle').innerText = leftTitleVal.toUpperCase();
            document.getElementById('displayRightTitle').innerText = rightTitleVal.toUpperCase();
        }

        // טעינת תמונת החניך והצגתה בריבוע
        function handleFileLoad(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('photoName').innerText = file.name;
                const imgElement = document.getElementById('studentPhoto');
                imgElement.src = URL.createObjectURL(file);
                imgElement.style.display = 'block';
            }
        }
    </script>

</body>
</html>
